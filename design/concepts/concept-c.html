<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f2ee; font-family: 'IBM Plex Sans', sans-serif; padding: 48px; width: 760px; }
.label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
.desc { font-size: 11px; color: #888; margin-bottom: 32px; font-weight: 300; }
.row { display: flex; flex-wrap: wrap; gap: 20px; }
.card { background: #ebe6df; border: 1px solid #c8bfb5; border-radius: 3px; padding: 36px 44px; display: flex; flex-direction: column; align-items: center; gap: 14px; min-width: 180px; }
.note { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #a09890; letter-spacing: 1px; text-transform: uppercase; text-align: center; }
.divv { width: 1px; height: 36px; background: #c8bfb5; }
</style></head><body>
<div class="label">C — one mark + Guide wordmark</div>
<div class="desc">The mark establishes ecosystem context. Guide sits within the one family, explicitly.</div>
<div class="row">

  <div class="card">
    <div style="display:flex;align-items:center;gap:14px;">
      <img src="../../branding/one-logo-transparent.png" width="30" height="30" style="filter:brightness(0);display:block;">
      <div class="divv"></div>
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:34px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
    </div>
    <div class="note">horizontal · divided</div>
  </div>

  <div class="card">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <img src="../../branding/one-logo-transparent.png" width="40" height="40" style="filter:brightness(0);display:block;">
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:34px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
    </div>
    <div class="note">stacked</div>
  </div>

  <div class="card">
    <div style="display:flex;flex-direction:column;align-items:flex-start;gap:8px;">
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:38px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
      <div style="display:flex;align-items:center;gap:5px;">
        <img src="../../branding/one-logo-transparent.png" width="12" height="12" style="filter:brightness(0);opacity:0.4;display:block;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#888;">by one</span>
      </div>
    </div>
    <div class="note">Guide primary · one footnote</div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="../../branding/one-logo-transparent.png" width="26" height="26" style="filter:brightness(0);opacity:0.5;display:block;">
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:34px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
    </div>
    <div class="note">mark + word · no divider</div>
  </div>

</div>
</body></html>

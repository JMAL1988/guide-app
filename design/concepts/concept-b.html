<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f2ee; font-family: 'IBM Plex Sans', sans-serif; padding: 48px; width: 760px; }
.label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
.desc { font-size: 11px; color: #888; margin-bottom: 32px; font-weight: 300; }
.row { display: flex; flex-wrap: wrap; gap: 20px; }
.card { background: #ebe6df; border: 1px solid #c8bfb5; border-radius: 3px; padding: 36px 44px; display: flex; flex-direction: column; align-items: flex-start; gap: 14px; min-width: 200px; }
.note { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #a09890; letter-spacing: 1px; text-transform: uppercase; }
</style></head><body>
<div class="label">B — Wordmark + descriptor</div>
<div class="desc">Name anchored by a mono line. Gives Guide context and personality without a separate mark.</div>
<div class="row">
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#8b7f72;">Structure for your day</div>
    <div class="note">brand-l tag</div>
  </div>
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#888;">Routines · Rhythm · Rest</div>
    <div class="note">dim tag</div>
  </div>
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:200;letter-spacing:7px;text-transform:uppercase;color:#1a1a1a;line-height:1;">Guide</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8b7f72;">Personal rhythm system</div>
    <div class="note">wide + tag</div>
  </div>
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
    <div style="width:28px;height:1px;background:#6b5f52;"></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#888;">For ADHD minds</div>
    <div class="note">rule + tag</div>
  </div>
</div>
</body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f2ee; font-family: 'IBM Plex Sans', sans-serif; padding: 48px; width: 760px; }
.label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
.desc { font-size: 11px; color: #888; margin-bottom: 32px; font-weight: 300; }
.row { display: flex; flex-wrap: wrap; gap: 20px; }
.card { background: #ebe6df; border: 1px solid #c8bfb5; border-radius: 3px; padding: 36px 44px; display: flex; flex-direction: column; align-items: center; gap: 14px; min-width: 160px; }
.note { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #a09890; letter-spacing: 1px; text-transform: uppercase; text-align: center; }
</style></head><body>
<div class="label">D — Step mark (Guide-specific)</div>
<div class="desc">Three ascending bars — Guide's own mark. Derived from one's bar language. Reads as steps, progression, routine-building. Could animate during transitions.</div>
<div class="row">

  <div class="card">
    <div style="display:flex;align-items:flex-end;gap:6px;">
      <div style="width:10px;height:18px;border-radius:5px;background:#1a1a1a;"></div>
      <div style="width:10px;height:27px;border-radius:5px;background:#1a1a1a;"></div>
      <div style="width:10px;height:36px;border-radius:5px;background:#1a1a1a;"></div>
    </div>
    <div class="note">ascending · dark</div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="display:flex;align-items:flex-end;gap:5px;">
        <div style="width:7px;height:14px;border-radius:3.5px;background:#1a1a1a;"></div>
        <div style="width:7px;height:21px;border-radius:3.5px;background:#1a1a1a;"></div>
        <div style="width:7px;height:28px;border-radius:3.5px;background:#1a1a1a;"></div>
      </div>
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:34px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;line-height:1;">Guide</div>
    </div>
    <div class="note">mark + wordmark</div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:flex-end;gap:6px;">
      <div style="width:10px;height:18px;border-radius:5px;background:#6b5f52;"></div>
      <div style="width:10px;height:27px;border-radius:5px;background:#8b7f72;"></div>
      <div style="width:10px;height:36px;border-radius:5px;background:#1a1a1a;"></div>
    </div>
    <div class="note">brand gradient</div>
  </div>

  <div class="card" style="background:#111;border-color:#333;">
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="display:flex;align-items:flex-end;gap:5px;">
        <div style="width:7px;height:14px;border-radius:3.5px;background:#f0ede8;"></div>
        <div style="width:7px;height:21px;border-radius:3.5px;background:#f0ede8;"></div>
        <div style="width:7px;height:28px;border-radius:3.5px;background:#f0ede8;"></div>
      </div>
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:34px;font-weight:300;color:#f0ede8;letter-spacing:-0.5px;line-height:1;">Guide</div>
    </div>
    <div class="note" style="color:#555;">on dark</div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:flex-end;gap:6px;">
      <div style="width:10px;height:36px;border-radius:5px;background:#1a1a1a;"></div>
      <div style="width:10px;height:27px;border-radius:5px;background:#1a1a1a;"></div>
      <div style="width:10px;height:18px;border-radius:5px;background:#1a1a1a;"></div>
    </div>
    <div class="note">descending · wind-down</div>
  </div>

</div>
</body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f2ee; font-family: 'IBM Plex Sans', sans-serif; padding: 48px; width: 760px; }
.label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
.desc { font-size: 11px; color: #888; margin-bottom: 32px; font-weight: 300; }
.row { display: flex; flex-wrap: wrap; gap: 20px; }
.card { background: #ebe6df; border: 1px solid #c8bfb5; border-radius: 3px; padding: 36px 44px; display: flex; flex-direction: column; align-items: center; gap: 14px; min-width: 160px; }
.note { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #a09890; letter-spacing: 1px; text-transform: uppercase; text-align: center; }
.dark { background: #111; border-color: #333; }
</style></head><body>
<div class="label">A — Wordmark only</div>
<div class="desc">IBM Plex Sans. Weight and tracking variations. No mark — just the name.</div>
<div class="row">
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:300;color:#1a1a1a;letter-spacing:-0.5px;">Guide</div>
    <div class="note">300 · default</div>
  </div>
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:200;letter-spacing:8px;text-transform:uppercase;color:#1a1a1a;">Guide</div>
    <div class="note">200 · wide</div>
  </div>
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:500;letter-spacing:-1.5px;color:#1a1a1a;">Guide</div>
    <div class="note">500 · tight</div>
  </div>
  <div class="card">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:400;color:#1a1a1a;letter-spacing:1px;">Guide</div>
    <div class="note">Mono · 400</div>
  </div>
  <div class="card">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:300;color:#8b7f72;letter-spacing:-0.5px;">Guide</div>
    <div class="note">300 · brand color</div>
  </div>
  <div class="card dark">
    <div style="font-family:'IBM Plex Sans',sans-serif;font-size:42px;font-weight:300;color:#f0ede8;letter-spacing:-0.5px;">Guide</div>
    <div class="note" style="color:#555;">300 · on dark</div>
  </div>
</div>
</body></html>
